<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" width="1920" height="720" role="img" aria-label="claude-bughunter — a Claude skill for offensive security tradecraft">
  <defs>
    <radialGradient id="bg" cx="35%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1B1A17"/>
      <stop offset="60%" stop-color="#13110E"/>
      <stop offset="100%" stop-color="#0A0907"/>
    </radialGradient>

    <radialGradient id="coralHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#DA7756" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#FFE4D1"/>
      <stop offset="40%" stop-color="#FFB591"/>
      <stop offset="100%" stop-color="#DA7756"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#2A2622" stroke-width="0.4" opacity="0.4"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ============================================================ -->
    <!-- Claude sunburst — the hero. True 8-ray Claude mark.          -->
    <!-- ============================================================ -->
    <symbol id="claudeSunburst" viewBox="-220 -220 440 440">
      <!-- 4 main rays (long, sharp) -->
      <g fill="#DA7756">
        <path d="M 0 -210 L 14 -32 L 0 -8 L -14 -32 Z"/>
        <path d="M 0 210 L 14 32 L 0 8 L -14 32 Z"/>
        <path d="M -210 0 L -32 -14 L -8 0 L -32 14 Z"/>
        <path d="M 210 0 L 32 -14 L 8 0 L 32 14 Z"/>
      </g>
      <!-- 4 secondary rays (shorter, fatter — Claude's diamonds) -->
      <g fill="#DA7756">
        <path d="M -130 -130 L -22 -10 L -8 -4 L -10 -22 Z"/>
        <path d="M 130 -130 L 22 -10 L 8 -4 L 10 -22 Z"/>
        <path d="M -130 130 L -22 10 L -8 4 L -10 22 Z"/>
        <path d="M 130 130 L 22 10 L 8 4 L 10 22 Z"/>
      </g>
      <!-- Bright core -->
      <circle cx="0" cy="0" r="11" fill="url(#coreGlow)"/>
      <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
    </symbol>

    <!-- Pinned bug specimen (small, used inside the reticle) -->
    <symbol id="specimenBug" viewBox="-22 -22 44 44">
      <g fill="#1B1A17" stroke="#DA7756" stroke-width="1" stroke-linejoin="round">
        <!-- mandibles -->
        <path d="M -4 -10 Q -10 -14 -12 -8 Q -8 -8 -5 -7 Z"/>
        <path d="M 4 -10 Q 10 -14 12 -8 Q 8 -8 5 -7 Z"/>
        <!-- head -->
        <ellipse cx="0" cy="-5" rx="4" ry="3.5"/>
        <!-- thorax -->
        <ellipse cx="0" cy="0" rx="5" ry="3"/>
        <!-- abdomen -->
        <ellipse cx="0" cy="6" rx="6" ry="7"/>
      </g>
      <!-- center seam -->
      <line x1="0" y1="-2" x2="0" y2="13" stroke="#DA7756" stroke-width="0.6" opacity="0.6"/>
      <!-- 6 thin legs -->
      <g stroke="#DA7756" stroke-width="0.8" stroke-linecap="round" fill="none">
        <path d="M -5 -2 L -10 -4"/>
        <path d="M -5 1 L -11 1"/>
        <path d="M -5 4 L -10 6"/>
        <path d="M 5 -2 L 10 -4"/>
        <path d="M 5 1 L 11 1"/>
        <path d="M 5 4 L 10 6"/>
      </g>
    </symbol>
  </defs>

  <!-- ============================== BACKGROUND ============================== -->
  <rect width="1920" height="720" fill="url(#bg)"/>
  <rect width="1920" height="720" fill="url(#grid)"/>

  <!-- Subtle vignette that pulls focus to left-of-center -->
  <ellipse cx="540" cy="380" rx="700" ry="500" fill="url(#coralHalo)" opacity="0.35"/>

  <!-- Cinematic corner brackets -->
  <g stroke="#DA7756" stroke-width="2" fill="none" opacity="0.85">
    <path d="M 30 30 L 30 78 M 30 30 L 78 30"/>
    <path d="M 1890 30 L 1890 78 M 1890 30 L 1842 30"/>
    <path d="M 30 690 L 30 642 M 30 690 L 78 690"/>
    <path d="M 1890 690 L 1890 642 M 1890 690 L 1842 690"/>
  </g>

  <!-- ============================== TOP MICROTEXT ============================== -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="3">
    <text x="58" y="56" fill="#807565">▸ CLAUDE  SKILL  ·  v1.0  ·  MIT</text>
    <text x="1862" y="56" text-anchor="end" fill="#807565">github.com/elementalsouls/Claude-BugHunter</text>
  </g>

  <!-- ============================== HERO: Claude sunburst ============================== -->
  <g transform="translate(540, 380)">
    <!-- Big halo behind -->
    <circle r="320" fill="url(#coralHalo)"/>

    <!-- Outer scan rings (subtle, hint at "scanning") -->
    <g fill="none" stroke="#DA7756" opacity="0.35">
      <circle r="270" stroke-width="0.8" stroke-dasharray="1 8"/>
      <circle r="248" stroke-width="0.5" stroke-dasharray="1 4"/>
      <circle r="228" stroke-width="0.4" opacity="0.2"/>
    </g>

    <!-- 4 cardinal scan ticks on the outer ring -->
    <g stroke="#DA7756" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-275" x2="0" y2="-262"/>
      <line x1="0" y1="262" x2="0" y2="275"/>
      <line x1="-275" y1="0" x2="-262" y2="0"/>
      <line x1="262" y1="0" x2="275" y2="0"/>
    </g>

    <!-- Sunburst -->
    <use href="#claudeSunburst" x="-220" y="-220" width="440" height="440" filter="url(#softGlow)"/>

    <!-- =========== HUNT DETAIL =========== -->
    <!-- A coral targeting beam extends from the SE diagonal ray to a captured bug. -->
    <!-- Aim line -->
    <line x1="120" y1="120" x2="200" y2="200" stroke="#DA7756" stroke-width="1" opacity="0.55" stroke-dasharray="2 4"/>

    <!-- Targeting reticle around the captured bug -->
    <g transform="translate(225, 225)">
      <circle r="34" fill="#0E0D0A" stroke="#DA7756" stroke-width="1.5"/>
      <circle r="34" fill="none" stroke="#DA7756" stroke-width="0.5" opacity="0.5" stroke-dasharray="2 3"/>
      <!-- crosshair ticks -->
      <g stroke="#DA7756" stroke-width="1.5" stroke-linecap="round">
        <line x1="-44" y1="0" x2="-37" y2="0"/>
        <line x1="37" y1="0" x2="44" y2="0"/>
        <line x1="0" y1="-44" x2="0" y2="-37"/>
        <line x1="0" y1="37" x2="0" y2="44"/>
      </g>
      <!-- inner thin crosshair -->
      <g stroke="#DA7756" stroke-width="0.5" opacity="0.5">
        <line x1="-26" y1="0" x2="-12" y2="0"/>
        <line x1="12" y1="0" x2="26" y2="0"/>
        <line x1="0" y1="-26" x2="0" y2="-12"/>
        <line x1="0" y1="12" x2="0" y2="26"/>
      </g>
      <!-- the captured bug -->
      <use href="#specimenBug" x="-18" y="-18" width="36" height="36"/>
      <!-- LOCKED label -->
      <text x="0" y="58" text-anchor="middle" font-size="9" letter-spacing="3"
            fill="#DA7756" font-weight="700"
            font-family="ui-monospace, monospace">▸ LOCKED</text>
    </g>

    <!-- Atmospheric particles -->
    <g fill="#FFB591" opacity="0.6">
      <circle cx="-180" cy="-90" r="1.2"/>
      <circle cx="170" cy="-160" r="1"/>
      <circle cx="-220" cy="80" r="1.3"/>
      <circle cx="-50" cy="-230" r="1"/>
      <circle cx="230" cy="-40" r="1"/>
      <circle cx="-130" cy="200" r="1.1"/>
      <circle cx="80" cy="240" r="0.9"/>
    </g>
  </g>

  <!-- ============================== TITLE BLOCK (right) ============================== -->
  <g transform="translate(940, 0)">
    <!-- Hairline accent above title -->
    <line x1="0" y1="252" x2="48" y2="252" stroke="#DA7756" stroke-width="3"/>
    <text x="58" y="258" font-size="11" letter-spacing="4"
          font-family="ui-monospace, monospace" fill="#DA7756" font-weight="700">A  CLAUDE  SKILL</text>

    <!-- Wordmark — single text element so the slash flows naturally -->
    <text y="365" font-size="96" font-weight="800"
          font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif"
          letter-spacing="-3">
      <tspan x="0" fill="#F5F4EE">claude</tspan><tspan dx="14" fill="#DA7756" font-weight="300">/</tspan><tspan dx="14" fill="#DA7756">bughunter</tspan>
    </text>

    <!-- Underline accent under bughunter -->
    <line x1="350" y1="382" x2="850" y2="382" stroke="#DA7756" stroke-width="2" opacity="0.55"/>

    <!-- One-line tagline -->
    <text x="0" y="430" font-size="22"
          font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif"
          fill="#C5BEB0">
      Turns Claude into a senior bug-bounty researcher.
    </text>

    <!-- Stats line (just enough to set the scale, README has the rest) -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="2.5">
      <text x="0" y="478" fill="#807565">▸</text>
      <text x="22" y="478" fill="#F5F4EE">40 skills</text>
      <text x="118" y="478" fill="#807565">·</text>
      <text x="138" y="478" fill="#F5F4EE">24 vuln classes</text>
      <text x="296" y="478" fill="#807565">·</text>
      <text x="316" y="478" fill="#F5F4EE">574+ disclosed reports</text>
      <text x="540" y="478" fill="#807565">·</text>
      <text x="560" y="478" fill="#F5F4EE">6-phase workflow</text>
    </g>
  </g>

  <!-- ============================== BOTTOM STRIP ============================== -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="3">
    <text x="58" y="678" fill="#807565">▸ INVOKE :</text>
    <text x="148" y="678" fill="#F5F4EE">drop into ~/.claude/skills · auto-triggers on topic</text>
    <text x="1862" y="678" text-anchor="end" fill="#DA7756" letter-spacing="6" font-weight="700">SHIP IT</text>
  </g>
</svg>
